<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4 - Formulario</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #2d3436;
        }

        form {
            background: white;
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background: #2d3436;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #636e72;
        }
    </style>

</head>

<body>

    <h1>Formulario de Registro</h1>

    <form action="#" method="post">
        <input type="text" placeholder="Nombre" required><br>
        <input type="email" placeholder="Correo electrónico" required><br>
        <input type="number" placeholder="Edad" required><br>
        <input type="submit" value="Enviar">
    </form>

</body>

</html>

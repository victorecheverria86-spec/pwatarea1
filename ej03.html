<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - Tabla</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #2d3436;
        }

        table {
            width: 70%;
            margin: 30px auto;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        th {
            background: #2d3436;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #ecf0f1;
        }

        tr:hover {
            background-color: #dfe6e9;
        }
    </style>

</head>

<body>

    <h1>Países y Capitales</h1>

    <table>
        <tr>
            <th>País</th>
            <th>Capital</th>
            <th>Continente</th>
        </tr>

        <tr>
            <td>Ecuador</td>
            <td>Quito</td>
            <td>América</td>
        </tr>

        <tr>
            <td>Colombia</td>
            <td>Bogotá</td>
            <td>América</td>
        </tr>

        <tr>
            <td>España</td>
            <td>Madrid</td>
            <td>Europa</td>
        </tr>

        <tr>
            <td>Argentina</td>
            <td>Buenos Aires</td>
            <td>América</td>
        </tr>

        <tr>
            <td>Japón</td>
            <td>Tokio</td>
            <td>Asia</td>
        </tr>
    </table>

</body>

</html>

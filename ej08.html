<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Diseño Responsivo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Texto */
        h1 {
            text-align: center;
            color: #362103;
        }

        /* Móviles */
        @media (max-width: 600px) {
            body {
                background-color: rgb(111, 133, 77);
            }
        }
    </style>

</head>

<body>

    <h1>Esta página demuestra un diseño responsivo usando media queries</h1>

</body>

</html>
